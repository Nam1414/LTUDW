    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Baloo+2:wght@400;600;700;800&family=Fredoka:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #E3F2FD;
            color: #2C3E50;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        .font-merriweather {
            font-family: 'Merriweather', serif;
        }
        .font-baloo {
            font-family: 'Baloo 2', cursive;
        }
        .font-fredoka {
            font-family: 'Fredoka', sans-serif;
        }
        .kant-gradient {
            background: linear-gradient(135deg, #90CAF9 0%, #F48FB1 100%);
        }
        .kant-logo-text {
            background: linear-gradient(135deg, #90CAF9 0%, #F48FB1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Baloo 2', cursive;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .hover-link:hover {
            color: #F48FB1;
            transform: translateX(5px);
            transition: all 0.3s ease;
        }
        .social-icon-hover:hover {
            background: linear-gradient(135deg, #90CAF9 0%, #F48FB1 100%) !important;
            color: white !important;
            transform: translateY(-3px);
            transition: all 0.3s ease;
        }
    </style>
